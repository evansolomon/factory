name: Release

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - master
    types:
      - completed

permissions:
  contents: read

jobs:
  release:
    name: Build release binaries
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'

    permissions:
      contents: write

    steps:
      - name: Check out source
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Determine release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash .github/scripts/determine-release.sh

      - name: Install dependencies
        if: steps.release.outputs.should_publish == 'true'
        run: bun install --frozen-lockfile

      - name: Build binaries
        if: steps.release.outputs.should_publish == 'true'
        run: bash .github/scripts/build-binaries.sh

      - name: Generate checksums
        if: steps.release.outputs.should_publish == 'true'
        run: bash .github/scripts/generate-checksums.sh

      - name: Publish release assets
        if: steps.release.outputs.should_publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.release.outputs.tag }}
          TARGET_SHA: ${{ github.event.workflow_run.head_sha }}
        run: bash .github/scripts/publish-release-assets.sh
